name: Deploy Haiku UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ui/haiku-patient-explorer/**"
      - ".github/workflows/deploy-haiku-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/haiku-patient-explorer/package-lock.json

      - name: Build UI
        working-directory: ui/haiku-patient-explorer
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          # Use committed representative data under public/data/ (slides + spatial JSON).
          npm run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Creates/enables the Pages site when repo Settings → Pages source is unset.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/haiku-patient-explorer/dist

      - id: deployment
        uses: actions/deploy-pages@v4
