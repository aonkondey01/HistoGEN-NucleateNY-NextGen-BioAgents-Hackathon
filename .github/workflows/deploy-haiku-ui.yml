name: Deploy HistoGEN UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ui/haiku-patient-explorer/**"
      - ".github/workflows/deploy-haiku-ui.yml"
  workflow_dispatch:

# Push built static files to the gh-pages branch (no Pages REST API / enablement needed).
permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/haiku-patient-explorer/package-lock.json

      - name: Build UI
        working-directory: ui/haiku-patient-explorer
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build:pages

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ui/haiku-patient-explorer/dist
          enable_jekyll: false
